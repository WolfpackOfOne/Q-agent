relationships:
  USES:
    description: "Entity uses a dataset or resource"
    from: [Notebook, Strategy, FactorModel, Pipeline, Agent]
    to: [Dataset, API, FactorModel]
    properties:
      - since: datetime
      - access_type: enum[read, write, readwrite]

  GENERATES:
    description: "Entity produces an output"
    from: [Notebook, Strategy, Pipeline, Agent]
    to: [Backtest, Dataset, Filing]
    properties:
      - generated_at: datetime

  HAS_BACKTEST:
    description: "Strategy lineage to one of its backtest runs (used by deployment_gate)"
    from: [Strategy]
    to: [Backtest]
    properties:
      - linked_at: datetime

  DEPENDS_ON:
    description: "Hard dependency — downstream breaks if upstream is stale"
    from: [Notebook, Strategy, Pipeline, FactorModel, Backtest]
    to: [Dataset, Pipeline, API, Repository]
    properties:
      - criticality: enum[blocking, soft]
      - valid_from: datetime
      - valid_to: datetime

  DEPLOYS_TO:
    description: "Strategy or backtest deployed to a broker or environment"
    from: [Strategy, Backtest]
    to: [API]
    properties:
      - deployed_at: datetime
      - environment: enum[live, paper, staging]

  QUERIES:
    description: "Agent or notebook queries a data source"
    from: [Agent, Notebook]
    to: [Dataset, API]
    properties:
      - last_queried: datetime
      - query_frequency: string

  PRODUCES:
    description: "Pipeline or notebook produces a dataset"
    from: [Pipeline, Notebook, Agent]
    to: [Dataset, Backtest]
    properties:
      - produced_at: datetime
      - version: string

  CONTAINS:
    description: "Repository or workflow contains sub-entities"
    from: [Repository, Workflow]
    to: [Notebook, Pipeline, Strategy]

  MONITORS:
    description: "Agent monitors a resource for changes"
    from: [Agent]
    to: [Pipeline, Dataset, Repository, Strategy]
    properties:
      - check_interval: string
      - alert_on: list[string]

  ORCHESTRATES:
    description: "Agent coordinates another agent or workflow"
    from: [Agent, Workflow]
    to: [Agent, Pipeline]

  FEEDS:
    description: "Dataset feeds into a factor model or strategy"
    from: [Dataset]
    to: [FactorModel, Strategy, Pipeline]
    properties:
      - valid_from: datetime
      - valid_to: datetime

  USED_BY:
    description: "Dataset or model used by a strategy"
    from: [Dataset, FactorModel]
    to: [Strategy, Backtest]

  BELONGS_TO:
    description: "Security belongs to a sector or index"
    from: [Security]
    to: [Security]
    properties:
      - relationship_type: enum[sector, index, etf_constituent]
      - valid_from: datetime
      - valid_to: datetime

  HOLDS:
    description: "Strategy or fund holds a security position"
    from: [Strategy]
    to: [Security]
    properties:
      - weight: float
      - valid_from: datetime
      - valid_to: datetime

  FILED:
    description: "Company filed an SEC document"
    from: [Security]
    to: [Filing]
    properties:
      - filed_at: datetime

  TRIGGERED_BY:
    description: "Event or workflow triggered by another entity"
    from: [Workflow, Pipeline, Agent]
    to: [Repository, Dataset, API]
    properties:
      - trigger_type: enum[webhook, schedule, manual, event]

# ── Hybrid property-graph-first architecture (issue #54) ──────────────────────
# Relationship types for the richer workspace graph.  Operational/dependency
# edges are kept strictly separate from similarity, suggestion, and policy edges.

  # ── Structural / code-graph edges ──────────────────────────────────────────

  DEFINES:
    description: "File or module defines a function or class"
    from: [File, Module]
    to: [Function, Class, Signal, ConfigParam]
    properties:
      - line: int

  IMPORTS:
    description: "Module imports another module (direct dependency)"
    from: [Module]
    to: [Module]
    properties:
      - alias: string
      - import_style: enum[direct, from, star]

  HAS_DOC:
    description: "Any node has an associated documentation file or docstring"
    from: [Project, Strategy, ResearchNotebook, Signal, Pipeline, File, Module, Function, Class]
    to: [Doc]
    properties:
      - doc_scope: enum[readme, inline, architecture, strategy]

  READS:
    description: "Notebook or pipeline reads a dataset or file at runtime"
    from: [ResearchNotebook, Notebook, Pipeline]
    to: [Dataset, File, ObjectStoreKey]
    properties:
      - read_at: datetime
      - path: string

  WRITES:
    description: "Notebook or pipeline writes a dataset or file at runtime"
    from: [ResearchNotebook, Notebook, Pipeline, LeanBacktest]
    to: [Dataset, File, ObjectStoreKey]
    properties:
      - written_at: datetime
      - path: string

  # ── Workspace hierarchy edges ───────────────────────────────────────────────

  CONTAINS:
    description: "Container holds workspace objects"
    from: [Repository, Workflow, Project]
    to: [Notebook, ResearchNotebook, Pipeline, Strategy, File, Module, Doc, AgentTask]

  BELONGS_TO_PROJECT:
    description: "Workspace object belongs to a specific project"
    from: [ResearchNotebook, LeanBacktest, Signal, ObjectStoreKey, ConfigParam, File, AgentTask]
    to: [Project]

  # ── Provenance / extraction edges ──────────────────────────────────────────

  DERIVED_FROM:
    description: "Dataset or signal was derived from another dataset (data lineage)"
    from: [Dataset, Signal]
    to: [Dataset, Pipeline]
    properties:
      - transform: string
      - derived_at: datetime

  OBSERVED_BY:
    description: "A node or fact was observed/extracted by an ExtractionRun"
    from: [Observation, File, Function, Class, Module]
    to: [ExtractionRun]
    properties:
      - first_seen: datetime

  # ── Policy / enforcement edges ──────────────────────────────────────────────

  VIOLATES:
    description: "A node violates a policy rule (blocking or warning)"
    from: [Strategy, LeanBacktest, Dataset, Pipeline]
    to: [PolicyDecision]
    properties:
      - severity: enum[info, warning, blocking]
      - detected_at: datetime

  ALLOWED_BY:
    description: "A node was explicitly allowed by a policy decision"
    from: [Strategy, LeanBacktest]
    to: [PolicyDecision]
    properties:
      - allowed_at: datetime

  DENIED_BY:
    description: "A node was explicitly denied by a policy decision"
    from: [Strategy, LeanBacktest]
    to: [PolicyDecision]
    properties:
      - denied_at: datetime

  RAISES:
    description: "Validation or extraction raised a risk flag"
    from: [ExtractionRun, Pipeline, ResearchNotebook]
    to: [RiskFlag]
    properties:
      - raised_at: datetime

  # ── Suggestion / inference edges (non-authoritative) ───────────────────────

  SUGGESTS:
    description: "An extraction or LLM suggests a relationship (low-trust; never enforced directly)"
    from: [ExtractionRun, Agent, Observation]
    to: [Project, Strategy, Dataset, Signal, Function, Class]
    properties:
      - confidence: float
      - suggestion_type: enum[dependency, usage, similarity, categorization]
      - suggested_at: datetime

  # ── Similarity / embedding edges (retrieval evidence only) ─────────────────
  # IMPORTANT: SIMILAR_TO is retrieval evidence, not dependency truth.
  # It must never be confused with DEPENDS_ON, IMPORTS, READS, or WRITES.
  # Agents querying for hard dependencies must exclude SIMILAR_TO edges.

  SIMILAR_TO:
    description: "Two nodes are semantically similar (embedding-backed; retrieval evidence only)"
    from: [Doc, File, ResearchNotebook, AgentTask, Signal]
    to: [Doc, File, ResearchNotebook, AgentTask, Signal]
    properties:
      - similarity_score: float
      - embedding_model: string
      - embedding_dim: int
      - computed_at: datetime
      - source_hash_a: string
      - source_hash_b: string
    constraints:
      - "similarity_score must be in [0.0, 1.0]"
      - "self-similarity edges (a == b) are forbidden"
      - "this edge type must never be used as a dependency or lineage source"
