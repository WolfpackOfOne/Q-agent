# Provenance is a shared block any node or relationship may carry, stamped by
# ingestion/extraction via agent_graph_system.ontology.provenance.Provenance.
# Stored flat under the `prov_` prefix so it never collides with the domain
# properties below. Absence of provenance means a legacy/manually-declared fact.
provenance_fields:
  description: "Where a fact came from and how much to trust it (prov_* keys)."
  properties:
    - prov_extractor: string          # component that asserted the fact
    - prov_assertion_type: enum[declared, extracted, inferred, learned]
    - prov_source_file: string        # optional — file the fact was read from
    - prov_line: int                  # optional — line within that file
    - prov_confidence: float          # 0.0–1.0 trust score
    - prov_source_hash: string        # optional — hash of the source span
    - prov_observed_at: datetime      # first time the fact was seen
    - prov_last_seen: datetime        # most recent re-observation

entities:
  Agent:
    description: "An AI agent in the system"
    properties:
      - name: string
      - role: string
      - status: enum[active, idle, error]
      - last_seen: datetime

  Dataset:
    description: "A data source or derived dataset"
    properties:
      - name: string
      - source: enum[WRDS, EDGAR, Bloomberg, Polymarket, Crypto, SQL, QuantConnect, GitHub, bundled]
      - status: enum[fresh, stale, unavailable]
      - last_updated: datetime
      - schema_version: string

  Notebook:
    description: "A research or analysis notebook"
    properties:
      - name: string
      - path: string
      - notebook_type: enum[research, backtest, analysis, ingestion]
      - last_run: datetime
      - status: enum[passing, failing, untested]

  Strategy:
    description: "A trading strategy"
    properties:
      - name: string
      - strategy_type: enum[momentum, mean_reversion, options, factor, ml]
      - status: enum[live, paper, backtesting, archived]
      - universe: string

  Backtest:
    description: "A completed backtest run"
    properties:
      - name: string
      - run_id: string
      - sharpe: float
      - max_drawdown: float
      - cagr: float
      - run_date: datetime
      - status: enum[completed, failed, running]

  Repository:
    description: "A git repository"
    properties:
      - name: string
      - url: string
      - branch: string
      - last_commit: string
      - last_updated: datetime

  Pipeline:
    description: "A data ingestion or processing pipeline"
    properties:
      - name: string
      - pipeline_type: enum[ingestion, transform, backtest, deploy]
      - schedule: string
      - status: enum[running, idle, failed]
      - last_run: datetime

  API:
    description: "An external API endpoint or service"
    properties:
      - name: string
      - url: string
      - api_type: enum[REST, GraphQL, WebSocket, FTP]
      - auth_type: enum[apikey, oauth, none]

  FactorModel:
    description: "A quantitative factor model"
    properties:
      - name: string
      - factors: list[string]
      - frequency: enum[daily, weekly, monthly]

  Filing:
    description: "An SEC filing"
    properties:
      - ticker: string
      - form_type: enum[10-K, 10-Q, 8-K]
      - period: string
      - filed_date: datetime
      - accession_number: string

  Security:
    description: "A financial security"
    properties:
      - ticker: string
      - name: string
      - asset_type: enum[equity, etf, option, future, crypto]
      - sector: string
      - exchange: string

  Workflow:
    description: "An orchestrated multi-step workflow"
    properties:
      - name: string
      - steps: list[string]
      - status: enum[active, paused, completed, failed]
      - trigger: enum[schedule, event, manual]

# ── Workspace graph extensions ────────────────────────────────────────────────
# Two sources are merged below:
#  1. ingestion/quantconnect/ — entities ALREADY WRITTEN by
#     graph_writer.ingest_project (see agent_graph_system/README.md,
#     "MyProjects ingestion"). Their keys and properties are load-bearing: do
#     not change them without updating graph_writer.py and parser.py.
#  2. The hybrid property-graph-first design (issue #54) — additional planned
#     labels, and extra properties on the shipped labels, for future ingestion
#     and extraction work. Anything marked "planned (issue #54)" is not yet
#     written by any extractor.
# The coarse legacy types above (Agent, Dataset, Notebook …) remain valid; the
# richer types below are preferred for new ingestion or extraction work.

  Project:
    description: "An atomic MyProjects/ QuantConnect project (container of files/docs)"
    properties:
      - name: string             # key
      - root: string             # absolute path to the project directory
      - last_ingest_run: datetime
      # planned (issue #54) — not yet written by ingestion:
      - project_type: enum[lean_strategy, research, template, shared]
      - status: enum[active, archived, experimental]
      - lean_project_id: string

  File:
    description: "A file within an ingested project"
    properties:
      - path: string             # key, project-qualified: "{project}/{rel_path}"
      - kind: enum[doc, notebook, python, data, other]
      - project: string
      - rel_path: string         # bare path, for display
      # planned (issue #54) — not yet written by ingestion:
      - extension: string
      - size_bytes: int
      - last_modified: datetime
      - content_hash: string

  Module:
    # NOTE: ingestion uses Module for classes, keyed "{project}.{class_name}".
    # The issue #54 design's "importable unit" concept is represented by File
    # in the current schema (see IMPORTS in relationships.yaml); Class below is
    # the planned richer per-class label.
    description: "A class defined within a project file"
    properties:
      - name: string             # key: "{project}.{class_name}"
      - class_name: string
      - project: string

  ResearchNotebook:
    description: "A research notebook (.ipynb or research/*.py marimo) within a project"
    properties:
      - path: string             # key, project-qualified: "{project}/{rel_path}"
      - project: string
      - rel_path: string
      # planned (issue #54) — not yet written by ingestion:
      - notebook_format: enum[marimo, jupyter]
      - last_run: datetime
      - status: enum[passing, failing, untested, stale]

  Signal:
    description: "A signal-producing function (domain/signals/), shared by name across projects"
    properties:
      - name: string             # key: function name
      - project: string
      # planned (issue #54) — not yet written by ingestion:
      - path: string
      - signal_type: enum[alpha, risk_overlay, factor, diagnostic]
      - frequency: enum[daily, weekly, monthly, intraday]

  ConfigParam:
    description: "A configuration parameter declared in a project"
    properties:
      - name: string             # key: "{project}.{param}"
      - param: string
      - value: string
      - project: string
      # planned (issue #54) — not yet written by ingestion:
      - param_type: enum[strategy, pipeline, notebook, global]
      - source_file: string

  ObjectStoreKey:
    description: "An ObjectStore key read/written by a strategy or notebook"
    properties:
      - key: string              # key; "<dynamic:{file}:{line}>" when computed at runtime
      - resolved: bool
      # planned (issue #54) — not yet written by ingestion:
      - project_name: string
      - content_type: string
      - size_bytes: int
      - last_written: datetime

  # --- hybrid property-graph design (issue #54) — planned labels --------------
  # No extractor writes these yet; they document the target architecture.

  Function:
    description: "A Python function or method"
    properties:
      - name: string
      - qualified_name: string
      - path: string
      - line_start: int
      - line_end: int
      - is_async: bool

  Class:
    description: "A Python class definition (planned richer label; ingestion currently writes classes as Module)"
    properties:
      - name: string
      - qualified_name: string
      - path: string
      - line_start: int
      - base_classes: list[string]

  LeanBacktest:
    description: "A completed QuantConnect cloud or local backtest run"
    properties:
      - run_id: string
      - project_name: string
      - sharpe: float
      - max_drawdown: float
      - cagr: float
      - total_trades: int
      - start_date: string
      - end_date: string
      - run_date: datetime
      - status: enum[completed, failed, running]

  AgentTask:
    description: "A task issued to or completed by an AI agent"
    properties:
      - task_id: string
      - description: string
      - status: enum[pending, in_progress, completed, failed, cancelled]
      - issued_at: datetime
      - completed_at: datetime
      - issuer: string

  Doc:
    description: "A documentation file (markdown, RST, or inline docstring)"
    properties:
      - path: string
      - title: string
      - doc_type: enum[readme, architecture, strategy, api, recipe, reference]
      - word_count: int
      - last_modified: datetime

  RiskFlag:
    description: "A risk or data-quality flag raised during validation"
    properties:
      - flag_id: string
      - flag_type: enum[data_quality, model_risk, staleness, compliance]
      - severity: enum[info, warning, blocking]
      - message: string
      - raised_at: datetime
      - resolved_at: datetime

  PolicyDecision:
    description: "A recorded result from the policy engine (allowed or denied)"
    properties:
      - decision_id: string
      - rule_name: string
      - allowed: bool
      - code: string
      - message: string
      - evidence: list[string]
      - decided_at: datetime

  ExtractionRun:
    description: "A single run of an extractor pipeline over a source"
    properties:
      - run_id: string
      - extractor: string
      - source_file: string
      - started_at: datetime
      - completed_at: datetime
      - facts_extracted: int
      - status: enum[completed, failed, partial]

  Observation:
    description: "A single fact extracted by an ExtractionRun, with confidence and provenance"
    properties:
      - observation_id: string
      - subject_type: string
      - subject_id: string
      - predicate: string
      - value: string
      - confidence: float
      - fact_status: enum[authoritative, extracted, inferred, learned, policy_decision]
      - observed_at: datetime
      - last_seen: datetime
      - deprecated: bool

  # --- ingestion/papers/ ------------------------------------------------------
  # Written by graph_writer.ingest_paper; see agent_graph_system/README.md
  # "arXiv paper ingestion" (#63).

  Paper:
    description: "An arXiv research paper"
    properties:
      - arxiv_id: string         # key
      - title: string
      - authors: list[string]
      - abstract: string
      - published_at: datetime
      - categories: list[string]

  PaperSection:
    description: "A section of an ingested paper"
    properties:
      - section_id: string       # key: "{arxiv_id}_s{index}"
      - title: string
      - summary: string
      - content: string
      - kind: enum[section, methodology, limitations]
      - index: int
