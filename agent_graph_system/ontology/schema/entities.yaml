# Provenance is a shared block any node or relationship may carry, stamped by
# ingestion/extraction via agent_graph_system.ontology.provenance.Provenance.
# Stored flat under the `prov_` prefix so it never collides with the domain
# properties below. Absence of provenance means a legacy/manually-declared fact.
provenance_fields:
  description: "Where a fact came from and how much to trust it (prov_* keys)."
  properties:
    - prov_extractor: string          # component that asserted the fact
    - prov_assertion_type: enum[declared, extracted, inferred, learned]
    - prov_source_file: string        # optional — file the fact was read from
    - prov_line: int                  # optional — line within that file
    - prov_confidence: float          # 0.0–1.0 trust score
    - prov_source_hash: string        # optional — hash of the source span
    - prov_observed_at: datetime      # first time the fact was seen
    - prov_last_seen: datetime        # most recent re-observation

entities:
  Agent:
    description: "An AI agent in the system"
    properties:
      - name: string
      - role: string
      - status: enum[active, idle, error]
      - last_seen: datetime

  Dataset:
    description: "A data source or derived dataset"
    properties:
      - name: string
      - source: enum[WRDS, EDGAR, Bloomberg, Polymarket, Crypto, SQL, QuantConnect, GitHub, bundled]
      - status: enum[fresh, stale, unavailable]
      - last_updated: datetime
      - schema_version: string

  Notebook:
    description: "A research or analysis notebook"
    properties:
      - name: string
      - path: string
      - notebook_type: enum[research, backtest, analysis, ingestion]
      - last_run: datetime
      - status: enum[passing, failing, untested]

  Strategy:
    description: "A trading strategy"
    properties:
      - name: string
      - strategy_type: enum[momentum, mean_reversion, options, factor, ml]
      - status: enum[live, paper, backtesting, archived]
      - universe: string

  Backtest:
    description: "A completed backtest run"
    properties:
      - name: string
      - run_id: string
      - sharpe: float
      - max_drawdown: float
      - cagr: float
      - run_date: datetime
      - status: enum[completed, failed, running]

  Repository:
    description: "A git repository"
    properties:
      - name: string
      - url: string
      - branch: string
      - last_commit: string
      - last_updated: datetime

  Pipeline:
    description: "A data ingestion or processing pipeline"
    properties:
      - name: string
      - pipeline_type: enum[ingestion, transform, backtest, deploy]
      - schedule: string
      - status: enum[running, idle, failed]
      - last_run: datetime

  API:
    description: "An external API endpoint or service"
    properties:
      - name: string
      - url: string
      - api_type: enum[REST, GraphQL, WebSocket, FTP]
      - auth_type: enum[apikey, oauth, none]

  FactorModel:
    description: "A quantitative factor model"
    properties:
      - name: string
      - factors: list[string]
      - frequency: enum[daily, weekly, monthly]

  Filing:
    description: "An SEC filing"
    properties:
      - ticker: string
      - form_type: enum[10-K, 10-Q, 8-K]
      - period: string
      - filed_date: datetime
      - accession_number: string

  Security:
    description: "A financial security"
    properties:
      - ticker: string
      - name: string
      - asset_type: enum[equity, etf, option, future, crypto]
      - sector: string
      - exchange: string

  Workflow:
    description: "An orchestrated multi-step workflow"
    properties:
      - name: string
      - steps: list[string]
      - status: enum[active, paused, completed, failed]
      - trigger: enum[schedule, event, manual]

  # --- ingestion/quantconnect/ -----------------------------------------------
  # Written by graph_writer.ingest_project; see agent_graph_system/README.md
  # "MyProjects ingestion". Strategy/Dataset above are shared with this writer.

  Project:
    description: "An atomic MyProjects/ QuantConnect project (container of files/docs)"
    properties:
      - name: string             # key
      - root: string             # absolute path to the project directory
      - last_ingest_run: datetime

  File:
    description: "A file within an ingested project"
    properties:
      - path: string             # key, project-qualified: "{project}/{rel_path}"
      - kind: enum[doc, notebook, python, data, other]
      - project: string
      - rel_path: string         # bare path, for display

  ResearchNotebook:
    description: "A research notebook (.ipynb or research/*.py marimo) within a project"
    properties:
      - path: string             # key, project-qualified: "{project}/{rel_path}"
      - project: string
      - rel_path: string

  Module:
    description: "A class defined within a project file"
    properties:
      - name: string             # key: "{project}.{class_name}"
      - class_name: string
      - project: string

  Signal:
    description: "A signal-producing function (domain/signals/), shared by name across projects"
    properties:
      - name: string             # key: function name
      - project: string

  ConfigParam:
    description: "A configuration parameter declared in a project"
    properties:
      - name: string             # key: "{project}.{param}"
      - param: string
      - value: string
      - project: string

  ObjectStoreKey:
    description: "An ObjectStore key read/written by a strategy or notebook"
    properties:
      - key: string              # key; "<dynamic:{file}:{line}>" when computed at runtime
      - resolved: bool

  # --- ingestion/papers/ ------------------------------------------------------
  # Written by graph_writer.ingest_paper; see agent_graph_system/README.md
  # "arXiv paper ingestion" (#63).

  Paper:
    description: "An arXiv research paper"
    properties:
      - arxiv_id: string         # key
      - title: string
      - authors: list[string]
      - abstract: string
      - published_at: datetime
      - categories: list[string]

  PaperSection:
    description: "A section of an ingested paper"
    properties:
      - section_id: string       # key: "{arxiv_id}_s{index}"
      - title: string
      - summary: string
      - content: string
      - kind: enum[section, methodology, limitations]
      - index: int
