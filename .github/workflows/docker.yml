name: docker

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wolfpackofone/q-agent

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tags=""
          # PR builds: only a local dev tag (we don't push these).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            tags="${REGISTRY}/${IMAGE_NAME}:pr-${{ github.event.number }}"
          else
            # Push to main → :latest + :sha-<short>
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              tags="${REGISTRY}/${IMAGE_NAME}:latest"
              tags="$tags,${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA:0:7}"
            fi
            # Version tag push → :vX.Y.Z (and also bump :latest)
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              version="${GITHUB_REF#refs/tags/}"
              tags="${REGISTRY}/${IMAGE_NAME}:${version},${REGISTRY}/${IMAGE_NAME}:latest"
            fi
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "Computed tags: $tags"

      - name: Build image (load locally for smoke tests)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: q-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — lean CLI loads
        run: docker run --rm q-agent:ci lean --help | head -5

      - name: Smoke test — infrastructure imports
        run: |
          docker run --rm q-agent:ci python -c \
            "import ccxt, pandas, numpy, yfinance, tenacity, tqdm, dotenv, requests; print('OK')"

      - name: Smoke test — marimo imports
        run: docker run --rm q-agent:ci python -c "import marimo; print(marimo.__version__)"

      - name: Smoke test — pytest (skip git-dependent hygiene tests)
        run: |
          docker run --rm q-agent:ci pytest \
            -m "not integration" \
            --ignore=tests/hygiene \
            -p no:cacheprovider \
            -q

      - name: Smoke test — ElectionIndustryBeta demo project shipped
        run: docker run --rm q-agent:ci test -d /workspace/MyProjects/ElectionIndustryBeta

      - name: Secrets-in-layers check
        run: |
          if docker history q-agent:ci | grep -iE 'lean\.json|\.env|credentials|\.key'; then
            echo "FAIL: secret reference found in image layers"
            exit 1
          fi
          echo "OK: no secret references in image history"

      - name: Push image
        if: github.event_name != 'pull_request' && steps.tags.outputs.tags != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.pushed_at }}
