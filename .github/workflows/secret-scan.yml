name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Scan for committed secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  personal-paths:
    name: Scan for hardcoded personal paths
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan text files for personal paths
        shell: bash
        run: |
          set -euo pipefail

          echo "Scanning for hardcoded personal paths..."

          # Generic pattern: any absolute path containing a user-home directory.
          # Catches /Users/<anyone>/, /home/<anyone>/, /mnt/c/Users/<anyone>/, and C:\Users\<anyone>\
          # while excluding generic placeholders like /Users/<user>/ or /home/<user>/.
          PATTERN='(/Users/[A-Za-z][A-Za-z0-9._-]+/|/home/[A-Za-z][A-Za-z0-9._-]+/|/mnt/c/Users/[A-Za-z][A-Za-z0-9._-]+/|C:\\Users\\[A-Za-z][A-Za-z0-9._-]+\\)'

          # The following files are excluded because they document the
          # canonical container home directory for the non-root user
          # created in the Dockerfile, not a personal host path.
          if git grep -n -I -E "$PATTERN" -- \
            ':!*.png' \
            ':!*.jpg' \
            ':!*.jpeg' \
            ':!*.gif' \
            ':!*.pdf' \
            ':!*.zip' \
            ':!evaluation/runs/**' \
            ':!docs/docker.md' \
            ':!docs/start-here.md' \
            ':!claude.md' \
            ':!.claude/skills/docker-workflow/SKILL.md'
          then
            echo ""
            echo "Blocked: hardcoded personal path found."
            echo "Use repo-relative paths, environment variables, or documented placeholders instead."
            exit 1
          fi

          echo "No hardcoded personal paths found."
