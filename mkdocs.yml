site_name: Q-agent
site_description: AI-compatible quantitative research workspace with pipelines, notebooks, LEAN strategies, and reproducible workflows.
site_url: https://wolfpackofone.github.io/Q-agent/
repo_url: https://github.com/WolfpackOfOne/Q-agent
repo_name: WolfpackOfOne/Q-agent
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Why Q-agent: why-q-agent.md

  - Workflows:
      - ElectionIndustryBeta: workflows/election-industry-beta.md

  - Getting Started:
      - LEAN & QuantConnect: getting-started.md
      - Running Notebooks: notebooks.md
      - Docker: docker.md

  - Data Pipelines:
      - Overview: pipelines/index.md
      - Crypto: pipelines/crypto.md
      - Polymarket: pipelines/polymarket.md
      - WRDS / CRSP: pipelines/wrds.md
      - SEC EDGAR: pipelines/edgar.md
      - yfinance: pipelines/yfinance.md

  - Research:
      - Golden Path: golden-path.md
      - Research Recipes: research-recipes.md
      - Examples: research-examples.md

  - Agent Workflows: agent-workflows.md

  - Architecture: architecture.md
  - Graph Architecture: architecture-hybrid-graph.md

  - Roadmap:
      - Roadmap: roadmap.md
      - Public Release Checklist: release-checklist.md

  - Contributing: contributing.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/WolfpackOfOne/Q-agent
